name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest
      # The whole suite now runs in CI, not an allowlist.
      #
      # It used to be an allowlist because most tests needed a ~19 MB gitignored
      # play-by-play cache and errored without it. The consequence was that
      # test_leakage.py -- the file its own docstring calls "the #1 kill bug
      # test" -- never ran here at all, and neither did test_reproducibility or
      # test_positions. A committed 1.2 MB real slice
      # (tests/fixtures/pbp_2019_2020.parquet) now backs those tests, so they
      # run on every push.
      #
      # STRICT_FIXTURES makes a MISSING fixture a hard failure rather than a
      # skip. Without it a future change that deleted or renamed the fixture
      # would turn the leakage guards into silent skips and CI would stay
      # green -- which is the failure mode this whole change exists to close.
      - name: Run the full suite (fixtures required, skips not tolerated)
        env:
          FABLESFABLE_STRICT_FIXTURES: "1"
        run: pytest -q tests/

      # Kept as an explicit second pass: these are the files that must pass with
      # NO data of any kind, so a regression that makes one of them depend on a
      # cache is caught here rather than masked by the fixture.
      - name: Run data-independent behavioral tests
        run: >-
          pytest -q
          tests/test_all_data_audit.py
          tests/test_bootstrap_history.py
          tests/test_market_config.py
          tests/test_state_store.py
          tests/test_projection_contract_consumer.py
          tests/test_availability.py
          tests/test_accuracy_protocol.py
          tests/test_calibration.py
          tests/test_clv_killcheck.py
          tests/test_eval_harness.py
          tests/test_freshness.py
          tests/test_learning.py
          tests/test_notify_secrets_app.py
          tests/test_oddsapi_props.py
          tests/test_rag.py
          tests/test_refresh_preserves_history.py
          tests/test_sleeper.py
          tests/test_synthesis.py
          tests/test_sanity_diff.py
          tests/test_numeric_edge_cases.py
          tests/test_failure_modes.py
          tests/test_schema_and_artifact_integrity.py
          tests/test_guard_mutations.py
          tests/test_golden_output.py
          tests/test_explainability.py
          tests/test_explain_cards.py
